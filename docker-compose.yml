services:
  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: core_nest_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SWAGGER_ENABLED: "true"
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/${APP_PREFIX:-api/v1}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # t2.micro has 1 GB RAM — keep the API under ~256 MB
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: core_nest_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: core_nest_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Low-memory tuning for t2.micro (leaves headroom within 700 MB total budget)
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Postgres peak usage ~200 MB with the settings above
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Mailhog (development email catcher) ──────────────────────────────────────
  # Only starts with: docker compose --profile dev up
  mailhog:
    image: mailhog/mailhog:latest
    container_name: core_nest_mailhog
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  postgres_data:
    driver: local
